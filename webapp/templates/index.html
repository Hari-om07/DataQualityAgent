<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Data Quality Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background: #4f46e5;
            width: 100%;
            padding: 2rem 1rem;
            color: white;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2rem; }
        .container {
            margin-top: 3rem;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        label { font-weight: 600; margin-top: 1rem; display: block; }
        input[type="file"], select {
            margin-top: 1rem;
            padding: 0.5rem;
            width: 80%;
        }
        button {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background-color: #4f46e5;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover { background-color: #3730a3; }
        footer {
            margin-top: auto;
            padding: 1rem;
            color: #6b7280;
        }
        .description {
            margin-bottom: 1rem;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <header>
        <h1>Data Quality Agent</h1>
    </header>

    <div class="container">
        <p class="description">Input your own dataset OR use a built-in dataset for analysis</p>
        <form method="post" enctype="multipart/form-data">
            <label>Select analysis type:</label>
            <select name="dataset_type" id="dataset_type" onchange="toggleInput()">
                <option value="upload">Upload your own CSV</option>
                <option value="builtin">Use built-in dataset</option>
            </select>

            <!-- CSV Upload -->
            <div id="file_input">
                <input type="file" name="dataset">
            </div>

            <!-- Built-in dataset selection -->
            <div id="builtin_input" style="display: none; margin-top: 1rem;">
                <label>Select built-in dataset:</label>
                <select name="builtin_dataset">
                    <option value="iris">Iris</option>
                    <option value="wine">Wine</option>
                    <option value="breast_cancer">Breast Cancer</option>
                    <option value="digits">Digits</option>
                </select>
            </div>

            <button type="submit">Analyze Dataset</button>
        </form>
    </div>

    <script>
        function toggleInput() {
            const type = document.getElementById("dataset_type").value;
            document.getElementById("file_input").style.display = (type === "upload") ? "block" : "none";
            document.getElementById("builtin_input").style.display = (type === "builtin") ? "block" : "none";
        }
    </script>
</body>
</html>
